services:
  mysql:
    image: mysql:8.4
    container_name: stockflow-mysql
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: stockflow
      MYSQL_USER: stockflow_user
      MYSQL_PASSWORD: stockflow_secret
      MYSQL_ROOT_PASSWORD: root_secret
      TZ: Asia/Jakarta

    ports:
      - "3307:3306"

    volumes:
      - stockflow_mysql_data:/var/lib/mysql

    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-proot_secret"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  stockflow_mysql_data: